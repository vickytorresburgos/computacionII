version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: sdas_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sdas_net

  server:
    build: .
    container_name: sdas_server
    ports:
      - "8888:8888"
    depends_on:
      redis:
        condition: service_healthy 
    command: "python src/server.py --host :: --port 8888"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - sdas_net

  celery_worker:
    build: .
    deploy:
      replicas: 3
    depends_on:
      redis:
        condition: service_healthy 
      server:
        condition: service_started
    command: celery -A src.tasks worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - sdas_net

  web:
    build: .
    container_name: sdas_web
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy 
    command: "python src/web.py --host :: --port 5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - sdas_net

  client_web:
    build: .
    container_name: sdas_client_web
    depends_on:
      - server
    volumes:
      - ./logs_locales:/app/logs_locales
    command: python src/client.py --id Web-01 --host server --file logs_locales/web.log
    networks:
      - sdas_net

  client_db:
    build: .
    container_name: sdas_client_db
    depends_on:
      - server
    volumes:
      - ./logs_locales:/app/logs_locales
    command: python src/client.py --id DB-01 --host server --file logs_locales/db.log
    networks:
      - sdas_net

networks:
  sdas_net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: '10.50.0.0/16'
        - subnet: 'fd00:1::/80'